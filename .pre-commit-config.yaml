repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-added-large-files
      - id: check-json
      - id: check-merge-conflict
      - id: check-toml
      - id: check-yaml
      - id: detect-private-key
      - id: trailing-whitespace
      - id: end-of-file-fixer

  - repo: local
    hooks:
      - id: sync-dotenv
        name: sync-dotenv
        language: system
        entry: sync-dotenv
        args: ["--env", "bash/.env", "--sample", "bash/.env.example"]
